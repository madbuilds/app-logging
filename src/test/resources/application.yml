app:
  logging:
    level:
      root: warn
      com.github.mad: info

    filter:
      duplicate-message-filter:
        enabled: true
        markers:
          FILTERED
          EXAMPLE
        repeats: 3
        expire: 5
        cache-size: 100

    appender:
      file: # prints to file
        enabled: false
        name: app.log
      loki: # prints to loki endpoint
        enabled: false
        name: TEST_APP